name: Provider Spike CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: provider-spike-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify Provider Spike on Windows
    runs-on: windows-2025
    timeout-minutes: 15
    defaults:
      run:
        working-directory: spikes/mimo-provider
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: spikes/mimo-provider/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify
